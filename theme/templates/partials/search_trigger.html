<button class="search-fab" type="button" data-search-open aria-label="Открыть поиск">Поиск</button>
<div class="search-modal" data-search-modal aria-hidden="true">
  <div class="search-backdrop" data-search-close></div>
  <section class="search-panel" role="dialog" aria-modal="true" aria-labelledby="search-title">
    <div class="search-head">
      <div><span class="eyebrow">По сайту</span><h2 id="search-title">Найти услугу или документ</h2></div>
      <button class="icon-button" type="button" data-search-close aria-label="Закрыть поиск">×</button>
    </div>
    <label class="search-field">
      <span>Запрос</span>
      <input type="search" placeholder="Например: медицинские отходы" minlength="2" data-search-input />
    </label>
    <div class="search-results" data-search-results><p class="muted">Введите минимум два символа.</p></div>
  </section>
</div>
