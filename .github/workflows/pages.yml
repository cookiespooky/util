name: Build and deploy Notepub site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NOTEPUB_REF: ff6d7902b9675cca01363b81ab6a3afedcddd565
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: true

      - name: Install Notepub
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install "github.com/cookiespooky/notepub/cmd/notepub@${NOTEPUB_REF}"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Build static site
        env:
          NOTEPUB_BIN: ${{ runner.temp }}/bin/notepub
        run: ./scripts/build.sh

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
