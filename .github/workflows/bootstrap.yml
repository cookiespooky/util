name: Bootstrap full site

on:
  push:
    branches: [main]
    paths: [site-source.tar.gz.b64]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: util-bootstrap
  cancel-in-progress: true

env:
  NOTEPUB_REF: ff6d7902b9675cca01363b81ab6a3afedcddd565

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unpack complete site
        run: |
          base64 --decode site-source.tar.gz.b64 > /tmp/site.tar.gz
          tar -xzf /tmp/site.tar.gz
          rm -f site-source.tar.gz.b64 .github/workflows/bootstrap.yml

      - name: Commit source tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete Utilit text site"
          git push origin main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install Notepub
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install "github.com/cookiespooky/notepub/cmd/notepub@${NOTEPUB_REF}"

      - name: Build
        env:
          NOTEPUB_BIN: ${{ runner.temp }}/bin/notepub
        run: ./scripts/build.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
